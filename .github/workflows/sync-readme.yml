name: Sync Cloud-IDE Docs to Garden

on:
  push:
    branches:
      - main
    paths:
      - 'cloud-ide/src/README.md'
      - 'cloud-ide/src/frontend/README.md'
      - 'cloud-ide/src/backend/README.md'
      - 'cloud-ide/src/shared/README.md'
      - 'cloud-ide/src/pipeline/README.md'
      - 'cloud-ide/src/opensandbox/README.md'
  # Manual trigger button for easy testing
  workflow_dispatch: 

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Project Repository
        uses: actions/checkout@v4
        with:
          path: source-repo

      - name: Checkout Quartz Blog Repository
        uses: actions/checkout@v4
        with:
          repository: 't569/blog'
          token: ${{ secrets.BLOG_SYNC_TOKEN }}
          path: blog-repo

      - name: Extract and Map Documentation
        run: |
          # Create the dedicated folder in your blog
          mkdir -p blog-repo/content/projects/cloud-ide/
          
          # Map the Root src README to index.md 
          if [ -f source-repo/cloud-ide/src/README.md ]; then
            cp source-repo/cloud-ide/src/README.md blog-repo/content/projects/cloud-ide/index.md
          fi
          
          # Map the sub-module READMEs
          if [ -f source-repo/cloud-ide/src/frontend/README.md ]; then
            cp source-repo/cloud-ide/src/frontend/README.md blog-repo/content/projects/cloud-ide/frontend.md
          fi
          
          if [ -f source-repo/cloud-ide/src/backend/README.md ]; then
            cp source-repo/cloud-ide/src/backend/README.md blog-repo/content/projects/cloud-ide/backend.md
          fi
          
          if [ -f source-repo/cloud-ide/src/shared/README.md ]; then
            cp source-repo/cloud-ide/src/shared/README.md blog-repo/content/projects/cloud-ide/shared.md
          fi
          
          if [ -f source-repo/cloud-ide/src/pipeline/README.md ]; then
            cp source-repo/cloud-ide/src/pipeline/README.md blog-repo/content/projects/cloud-ide/pipeline.md
          fi
          
          if [ -f source-repo/cloud-ide/src/opensandbox/README.md ]; then
            cp source-repo/cloud-ide/src/opensandbox/README.md blog-repo/content/projects/cloud-ide/opensandbox.md
          fi

          # ==========================================
          # INJECT THE CONSTELLATION MESH
          # ==========================================
          # This loop goes through every Markdown file we just copied 
          # and appends a footer linking them all together.
          
          for file in blog-repo/content/projects/cloud-ide/*.md; do
            echo -e "\n\n---\n**System Architecture Nodes:** [[projects/cloud-ide/index|Root Hub]] | [[projects/cloud-ide/frontend|Frontend]] | [[projects/cloud-ide/backend|Backend]] | [[projects/cloud-ide/opensandbox|OpenSandbox]] | [[projects/cloud-ide/pipeline|Pipeline]]" >> "$file"
          done

      - name: Commit and Push to Blog
        run: |
          cd blog-repo
          git config user.name "GitHub Action Bot"
          git config user.email "action@github.com"
          
          git add content/projects/cloud-ide/
          
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-sync modular docs for cloud-ide"
          git push