name: Sync Cloud-IDE Docs to Garden

on:
  push:
    branches:
      - main
    # 1. Trigger the sync if ANY of these specific READMEs change
    paths:
      - 'src/README.md'
      - 'src/frontend/README.md'
      - 'src/backend/README.md'
      - 'src/shared/README.md'
      - 'src/pipeline/README.md'
      - 'src/opensandbox/README.md'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Project Repository
        uses: actions/checkout@v4
        with:
          path: source-repo

      - name: Checkout Quartz Blog Repository
        uses: actions/checkout@v4
        with:
          repository: 't569/blog'
          token: ${{ secrets.BLOG_SYNC_TOKEN }}
          path: blog-repo

      - name: Extract and Map Documentation
        run: |
          # Create the dedicated folder in your blog
          mkdir -p blog-repo/content/projects/cloud-ide/
          
          # Map the Root README to index.md (The landing page for the project)
          if [ -f source-repo/README.md ]; then
            cp source-repo/README.md blog-repo/content/projects/cloud-ide/index.md
          fi
          
          # Map the sub-module READMEs to specific markdown files
          if [ -f source-repo/frontend/README.md ]; then
            cp source-repo/frontend/README.md blog-repo/content/projects/cloud-ide/frontend.md
          fi
          if [ -f source-repo/backend/README.md ]; then
            cp source-repo/backend/README.md blog-repo/content/projects/cloud-ide/backend.md
          fi
          if [ -f source-repo/shared/README.md ]; then
            cp source-repo/shared/README.md blog-repo/content/projects/cloud-ide/shared.md
          fi
          if [ -f source-repo/pipeline/README.md ]; then
            cp source-repo/pipeline/README.md blog-repo/content/projects/cloud-ide/pipeline.md
          fi
          if [ -f source-repo/opensandbox/README.md ]; then
            cp source-repo/opensandbox/README.md blog-repo/content/projects/cloud-ide/opensandbox.md
          fi

      - name: Commit and Push to Blog
        run: |
          cd blog-repo
          git config user.name "GitHub Action Bot"
          git config user.email "action@github.com"
          
          # Add the specific cloud-ide folder
          git add content/projects/cloud-ide/
          
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-sync modular docs for cloud-ide"
          git push